apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-deployment
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: ansid0cker/bbuy-final-order-service:latest
        ports:
        - containerPort: 3000
        env:
        - name: ORDER_TARGET_URL
          value: "http://makeline-service:3001/order"
        - name: ORDER_TARGET_TIMEOUT_MS
          value: "5000"
        - name: ORDER_TARGET_MAX_RETRIES
          value: "2"
        - name: ORDER_TARGET_RETRY_BASE_MS
          value: "200"